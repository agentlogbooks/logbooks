name: Validate plugin manifests

on:
  push:
    paths:
      - '**/.claude-plugin/*.json'
      - '**/evals/evals.json'
  pull_request:
    paths:
      - '**/.claude-plugin/*.json'
      - '**/evals/evals.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          for f in \
            .claude-plugin/marketplace.json \
            .claude-plugin/plugin.json \
            plugins/deep-code-review/.claude-plugin/plugin.json \
            plugins/logbook-creator/.claude-plugin/plugin.json \
            plugins/deep-code-review/skills/deep-code-review/evals/evals.json; do
            echo "Checking $f ..."
            python3 -m json.tool "$f" > /dev/null
          done

      - name: Check required fields in plugin manifests
        run: |
          python3 << 'EOF'
          import json, sys

          required_plugin_fields = ["name", "version", "description", "author", "source"]
          errors = []

          manifests = [
            "plugins/deep-code-review/.claude-plugin/plugin.json",
            "plugins/logbook-creator/.claude-plugin/plugin.json",
          ]
          for path in manifests:
            data = json.load(open(path))
            for field in required_plugin_fields:
              if field not in data:
                errors.append(f"{path}: missing required field '{field}'")

          root = json.load(open(".claude-plugin/plugin.json"))
          for field in ["name", "version", "description", "author", "owner"]:
            if field not in root:
              errors.append(f".claude-plugin/plugin.json: missing field '{field}'")

          marketplace = json.load(open(".claude-plugin/marketplace.json"))
          for plugin in marketplace.get("plugins", []):
            for field in ["name", "source", "version", "description"]:
              if field not in plugin:
                errors.append(f"marketplace.json plugin '{plugin.get('name','?')}': missing '{field}'")

          if errors:
            print("Manifest validation errors:")
            for e in errors:
              print(f"  {e}")
            sys.exit(1)
          else:
            print("All manifests valid.")
          EOF

      - name: Check version consistency
        run: |
          python3 << 'EOF'
          import json, sys

          marketplace = json.load(open(".claude-plugin/marketplace.json"))
          root = json.load(open(".claude-plugin/plugin.json"))

          errors = []

          marketplace_versions = {p["name"]: p["version"] for p in marketplace.get("plugins", [])}

          dcr = json.load(open("plugins/deep-code-review/.claude-plugin/plugin.json"))
          lc  = json.load(open("plugins/logbook-creator/.claude-plugin/plugin.json"))

          for name, leaf_data in [("deep-code-review", dcr), ("logbook-creator", lc)]:
            mkt_ver = marketplace_versions.get(name)
            leaf_ver = leaf_data.get("version")
            if mkt_ver != leaf_ver:
              errors.append(
                f"Version mismatch for '{name}': marketplace.json={mkt_ver}, plugin.json={leaf_ver}"
              )

          if errors:
            print("Version consistency errors:")
            for e in errors:
              print(f"  {e}")
            sys.exit(1)
          else:
            print("All versions consistent.")
          EOF
